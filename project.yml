name: NoTyping
options:
  bundleIdPrefix: com.baodi
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: S4BS47942Q
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development
    AD_HOC_CODE_SIGNING_ALLOWED: NO
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: NoTyping
    INFOPLIST_KEY_NSMicrophoneUsageDescription: NoTyping needs microphone access to capture dictation audio for system-wide voice typing.
targets:
  NoTyping:
    type: application
    platform: macOS
    sources:
      - path: NoTyping
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baodi.NoTyping
        PRODUCT_NAME: NoTyping
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: NoTyping/NoTyping.entitlements
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
    dependencies:
      - sdk: Carbon.framework
      - sdk: ApplicationServices.framework
      - sdk: AVFoundation.framework
      - sdk: ServiceManagement.framework
  NoTypingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NoTypingTests
    dependencies:
      - target: NoTyping
schemes:
  NoTyping:
    build:
      targets:
        NoTyping: all
        NoTypingTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - NoTypingTests
